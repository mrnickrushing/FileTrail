version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      backend-all:
        update-types: ['major', 'minor', 'patch']

  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      mobile-all:
        update-types: ['major', 'minor', 'patch']
    ignore:
      # Expo/React Native major versions must be bumped together by hand
      # (SDK upgrades touch native code and EAS build profiles).
      - dependency-name: 'expo'
        update-types: ['version-update:semver-major']
      - dependency-name: 'expo-*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: /web/admin
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      admin-all:
        update-types: ['major', 'minor', 'patch']
    ignore:
      # TypeScript 7.x is the native (Go) port: its npm package exposes only
      # ./unstable/* and has no `main`, so Next.js 16's TypeScript detection
      # can't resolve the compiler and `next build` fails. Stay on 6.x until
      # Next.js supports the native port.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: /web/marketing
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      marketing-all:
        update-types: ['major', 'minor', 'patch']

  - package-ecosystem: npm
    directory: /cloudflare/email-worker
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      email-worker-all:
        update-types: ['major', 'minor', 'patch']

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      root-all:
        update-types: ['major', 'minor', 'patch']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions-all:
        update-types: ['major', 'minor', 'patch']
