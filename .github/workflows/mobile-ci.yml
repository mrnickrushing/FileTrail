name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci

      - name: Verify Expo SDK package alignment
        run: npx expo install --check

      - run: npm run typecheck

      - run: npm run lint

      # tar/cacache (via expo's @expo/cli) is a known, tracked high-severity
      # finding that only resolves via an Expo SDK major bump (52 -> 56+);
      # Dependabot is configured to ignore that bump for deliberate review,
      # so this audit is informational rather than blocking until then.
      - run: npm audit --audit-level=high
        continue-on-error: true
