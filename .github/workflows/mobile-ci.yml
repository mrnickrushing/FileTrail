name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci

      # This checks installed versions against whatever npm currently
      # considers "expected" for the SDK — i.e. against a moving target, not
      # against this repo's own package-lock.json. It has gone red twice on
      # unrelated PRs within days purely from upstream patch releases, with
      # no code change involved. Kept as visibility, not a merge blocker;
      # run `npx expo install --fix` locally when it flags something.
      - name: Verify Expo SDK package alignment
        run: npx expo install --check
        continue-on-error: true

      - run: npm run typecheck

      - run: npm run lint

      # tar/cacache (via expo's @expo/cli) is a known, tracked high-severity
      # finding that only resolves via an Expo SDK major bump (52 -> 56+);
      # Dependabot is configured to ignore that bump for deliberate review,
      # so this audit is informational rather than blocking until then.
      - run: npm audit --audit-level=high
        continue-on-error: true
